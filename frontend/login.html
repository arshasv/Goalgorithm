<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOALGORITHM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: var(--space-lg);
    }

    .auth-page::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--gradient-stadium);
      pointer-events: none;
      z-index: 0;
    }

    .auth-page::after {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--gradient-pitch);
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .auth-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: fadeInUp 0.6s var(--ease-out);
    }

    .auth-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-large);
      padding: var(--space-2xl);
      box-shadow: var(--shadow-xl);
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .auth-logo {
      font-size: 48px;
      margin-bottom: var(--space-sm);
      display: block;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .auth-subtitle {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      margin-top: 4px;
    }

    .auth-error {
      background: var(--color-status-error);
      color: white;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-small);
      font-size: var(--text-sm);
      margin-bottom: var(--space-md);
      display: none;
      text-align: center;
    }

    .auth-error.visible {
      display: block;
    }

    .auth-success {
      background: var(--color-status-success);
      color: white;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-small);
      font-size: var(--text-sm);
      margin-bottom: var(--space-md);
      display: none;
      text-align: center;
    }

    .auth-success.visible {
      display: block;
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-lg);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .auth-footer a {
      color: var(--color-text-link);
      font-weight: 600;
    }

    .auth-field {
      margin-bottom: var(--space-md);
    }

    .auth-field label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }

    .auth-field .form-input {
      width: 100%;
      padding: 12px 16px;
      font-size: var(--text-base);
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle .toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: var(--text-sm);
      padding: 4px;
    }

    .stadium-beam {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(37, 99, 235, 0.04) 0%, transparent 50%);
      animation: stadiumBeam 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes stadiumBeam {
      0% {
        opacity: 0;
        transform: translateX(-100%) rotate(-15deg);
      }

      50% {
        opacity: 0.06;
      }

      100% {
        opacity: 0;
        transform: translateX(200%) rotate(-15deg);
      }
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <button class="theme-toggle" id="theme-toggle-btn" title="Toggle theme" style="position: absolute; top: var(--space-lg); right: var(--space-lg); z-index: 10;"></button>
    <div class="stadium-beam"></div>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <span class="auth-logo">⚽</span>
          <h1 class="auth-title">GOALGORITHM</h1>
          <p class="auth-subtitle">Sign in to your account</p>
        </div>
        <div class="auth-success" id="auth-success"></div>
        <div class="auth-error" id="auth-error"></div>

        <form id="login-form" onsubmit="return handleLogin(event)">
          <div class="auth-field">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required
              autocomplete="email">
          </div>

          <div class="auth-field">
            <label for="password">Password</label>
            <div class="password-toggle">
              <input type="password" id="password" class="form-input" placeholder="Enter password" required
                autocomplete="current-password">
              <button type="button" class="toggle-btn" onclick="togglePassword()" tabindex="-1">👁</button>
            </div>
          </div>

          <div class="auth-btn-wrapper" style="margin-top:var(--space-lg)">
            <button type="submit" class="btn btn-primary btn-lg" id="login-btn" style="width:100%">
              <span id="login-btn-text">Sign In</span>
              <span class="spinner" id="login-spinner" style="display:none"></span>
            </button>
          </div>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Register Team</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    ThemeManager.init();

    // Check if redirecting from registration page
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('registered') === 'true') {
      const successEl = document.getElementById('auth-success');
      if (successEl) {
        successEl.textContent = 'Registration successful! Please sign in.';
        successEl.classList.add('visible');
      }
    }

    function togglePassword() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const el = document.getElementById('auth-error');
      if (el) {
        el.textContent = msg;
        el.classList.add('visible');
      }
      const successEl = document.getElementById('auth-success');
      if (successEl) successEl.classList.remove('visible');
    }

    function hideError() {
      const el = document.getElementById('auth-error');
      if (el) el.classList.remove('visible');
    }

    function parseErrorMessage(err) {
      if (!err) return 'Login failed. Please try again.';
      if (typeof err === 'string') return err;

      let detail = err.message || err.detail;
      if (err.data && err.data.detail) {
        detail = err.data.detail;
      }

      if (!detail) return err.message || 'Login failed. Please try again.';

      if (typeof detail === 'string') return detail;
      if (Array.isArray(detail)) {
        return detail.map(d => {
          if (d && typeof d === 'object') {
            const field = d.loc ? d.loc.filter(locPart => locPart !== 'body').join('.') : '';
            return `${field ? field + ': ' : ''}${d.msg || 'invalid value'}`;
          }
          return String(d);
        }).join(', ');
      }
      if (typeof detail === 'object') {
        return detail.message || detail.detail || JSON.stringify(detail);
      }
      return String(detail);
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('login-btn-text');
      const spinner = document.getElementById('login-spinner');
      btn.classList.add('loading');
      if (btnText) btnText.textContent = 'Signing in...';
      if (spinner) spinner.style.display = 'inline-block';

      try {
        const user = await Auth.login(email, password);

        // Redirect based on role after successful login
        const role = user.role;
        if (role === 'ORGANIZER') {
          window.location.href = 'index.html#dashboard';
        } else {
          window.location.href = 'index.html#team-dashboard';
        }
      } catch (err) {
        showError(parseErrorMessage(err));
      } finally {
        btn.classList.remove('loading');
        if (btnText) btnText.textContent = 'Sign In';
        if (spinner) spinner.style.display = 'none';
      }
    }

    // Redirect if already authenticated
    if (Auth.isAuthenticated()) {
      const role = Auth.getRole();
      if (role === 'ORGANIZER') window.location.href = 'index.html#dashboard';
      else if (role === 'TEAM_LEADER') window.location.href = 'index.html#team-dashboard';
      else Auth.clearSession();
    }
  </script>
</body>

</html>
