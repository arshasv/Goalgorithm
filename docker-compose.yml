services:
  fifa-scoring-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fifa_user} -d ${POSTGRES_DB:-fifa_scoring_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  react-frontend:
    build:
      context: ./react-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./react-frontend:/app
      - /app/node_modules
    depends_on:
      - fifa-scoring-api
    restart: unless-stopped

volumes:
  postgres_data:
